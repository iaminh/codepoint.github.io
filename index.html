<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BepOrder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    h1 { font-size: 2.5rem; margin-bottom: 10px; color: #111; }
    .subtitle { color: #666; margin-bottom: 40px; font-size: 1.1rem; }
    .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-width: 200px; flex: 1; }
    .card h2 { margin-bottom: 10px; }
    .card p { color: #666; margin-bottom: 20px; }
    .card a { display: inline-block; background: #0066cc; color: #fff; padding: 10px 24px; border-radius: 6px; text-decoration: none; font-weight: 500; }
    .card a:hover { background: #0052a3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>BepOrder</h1>
    <p class="subtitle">Simple ordering for restaurants and their customers</p>

    <div class="cards">
      <div class="card">
        <h2>Privacy Policy</h2>
        <p>How we collect, use, and protect your data</p>
        <a href="privacy.html">Read More</a>
      </div>

      <div class="card">
        <h2>Support</h2>
        <p>FAQs and contact information</p>
        <a href="support.html">Get Help</a>
      </div>
    </div>
  </div>
</body>
</html>
